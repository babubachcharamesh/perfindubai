<!DOCTYPE html>
<html>
<head>
<script>
  // ── Minimal, fast localStorage bridge ──────────────────────────────────
  // All calls are synchronous so Streamlit gets the frame-height & component
  // value within milliseconds of the iframe loading — well inside the 5-second
  // "trouble loading" timeout window.

  var LS_KEY = "pf_finance_data_v2";

  // 1) Tell Streamlit the frame height (0 = hidden) — MUST come first
  window.parent.postMessage(
    { isStreamlitMessage: true, type: "streamlit:setFrameHeight", value: 0 },
    "*"
  );

  // 2) Read localStorage immediately and send current value to Python
  var _initVal = null;
  try { _initVal = localStorage.getItem(LS_KEY); } catch (e) {}
  window.parent.postMessage(
    { isStreamlitMessage: true, type: "streamlit:setComponentValue", value: { data: _initVal } },
    "*"
  );

  // 3) Listen for subsequent render calls (saves or re-reads)
  window.addEventListener("message", function (evt) {
    if (!evt.data || evt.data.type !== "streamlit:render") return;
    var args = evt.data.args || {};

    // Save if Python sent a payload
    if (args.payload) {
      try { localStorage.setItem(LS_KEY, args.payload); } catch (e) {}
    }

    // Always report the current value back to Python
    var val = null;
    try { val = localStorage.getItem(LS_KEY); } catch (e) {}
    window.parent.postMessage(
      { isStreamlitMessage: true, type: "streamlit:setComponentValue", value: { data: val } },
      "*"
    );
  });
</script>
</head>
<body></body>
</html>
